plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.blenfcreader'
version = '0.2.0'

android {
  namespace "expo.modules.blenfcreader"
  defaultConfig {
    minSdkVersion 23
    versionCode 1
    versionName "0.2.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation fileTree(dir: 'libs', include: ['*.aar'])
}
